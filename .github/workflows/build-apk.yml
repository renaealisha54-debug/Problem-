name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Fix for Node.js 20 deprecation
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # Updated from v4 to v5
        uses: actions/checkout@v5

      - name: Set up Java 17
        # Updated from v4 to v5
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
