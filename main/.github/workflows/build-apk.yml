name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept all SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Generate Gradle wrapper
        working-directory: main/backend/templates/android_base
        run: gradle wrapper --gradle-version 8.11.1

      - name: Make gradlew executable
        working-directory: main/backend/templates/android_base
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > main/backend/templates/android_base/app/my.keystore

      - name: Build release APK
        working-directory: main/backend/templates/android_base
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify APK exists
        run: |
          APK_PATH="main/backend/templates/android_base/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "APK not found at $APK_PATH"
            exit 1
          fi
          echo "APK size: $(du -sh $APK_PATH | cut -f1)"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: ProblemCode-release-${{ github.run_number }}
          path: main/backend/templates/android_base/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
