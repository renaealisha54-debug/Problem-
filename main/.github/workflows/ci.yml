name: ProblemCode CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: main/backend
        run: |
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Create required directories
        run: |
          mkdir -p main/backend/logs
          mkdir -p main/backend/builds
          mkdir -p main/backend/downloads
      - name: Run backend tests
        working-directory: main/backend
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          APP_API_KEY: ${{ secrets.APP_API_KEY }}
        run: pytest tests/ -v

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: main/frontend/package.json
      - name: Install dependencies
        working-directory: main/frontend
        run: npm install
      - name: Build frontend
        working-directory: main/frontend
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.BACKEND_URL }}
          CI: false
        run: npm run build

  android:
    name: Android Build
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Accept licenses
        run: yes | sdkmanager --licenses
      - name: Install SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"
      - name: Generate Gradle wrapper
        working-directory: main/backend/templates/android_base
        run: gradle wrapper --gradle-version 8.2
      - name: Make gradlew executable
        run: find main/backend/templates/android_base -name "gradlew" -exec chmod +x {} \;
      - name: Build debug APK
        working-directory: main/backend/templates/android_base
        run: ./gradlew assembleDebug --no-daemon
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: main/backend/templates/android_base/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
